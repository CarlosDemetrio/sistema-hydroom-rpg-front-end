<div class="flex align-items-center justify-content-center min-h-screen surface-ground">
  <div class="w-full md:w-6 lg:w-4">
    <p-card>
      <ng-template pTemplate="header">
        <div class="flex align-items-center justify-content-center gap-2 p-4">
          <i class="pi pi-book text-5xl text-primary"></i>
          <h1 class="text-3xl font-bold m-0">Ficha Controlador RPG</h1>
        </div>
      </ng-template>

      <div class="flex flex-column gap-4 p-4">
        <div class="text-center">
          <h2 class="text-2xl font-semibold m-0 mb-2">Bem-vindo!</h2>
          <p class="text-color-secondary m-0">
            Gerencie suas fichas de personagens de RPG de forma simples e eficiente.
          </p>
        </div>

        <div class="flex flex-column gap-3">
          <div class="flex align-items-center gap-3">
            <i class="pi pi-users text-2xl text-primary"></i>
            <span class="text-lg">Organize seus jogos</span>
          </div>
          <div class="flex align-items-center gap-3">
            <i class="pi pi-id-card text-2xl text-primary"></i>
            <span class="text-lg">Crie fichas de personagens</span>
          </div>
          <div class="flex align-items-center gap-3">
            <i class="pi pi-shield text-2xl text-primary"></i>
            <span class="text-lg">Controle mestres e jogadores</span>
          </div>
        </div>

        <p-button
          label="Entrar com Google"
          icon="pi pi-google"
          (onClick)="loginWithGoogle()"
          styleClass="w-full"
          [raised]="true"
          severity="primary"
          size="large">
        </p-button>
      </div>
    </p-card>
  </div>
</div>
